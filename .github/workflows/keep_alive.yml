name: Supabase Keep-Alive

on:
  schedule:
    # Runs at 00:00 UTC every Monday and Thursday
    - cron: '0 0 * * 1,4'
  workflow_dispatch: 

# 1. This gives the script permission to "touch" the repo to keep it active
permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # 2. This "checks out" your code so the keepalive action can see the repo
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Keep Database Active
        run: |
          curl -i -X GET "https://fishmnjzdiqnfpwfmsob.supabase.co/rest/v1/users?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"

      - name: Keep Workflow Active
        uses: gautamkrishnar/keepalive-workflow@v2 # Updated to v2
