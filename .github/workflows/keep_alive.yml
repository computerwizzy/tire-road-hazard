name: Supabase Keep-Alive

on:
  schedule:
    # Runs at 00:00 UTC every Monday and Thursday
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # This lets you click a button to test it manually

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep Database Active
        run: |
          curl -i -X GET "https://fishmnjzdiqnfpwfmsob.supabase.co/rest/v1/users?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"


# Add this part below:
      - name: Keep Workflow Active
        uses: gautamkrishnar/keepalive-workflow@v1
